description: Runtime pointer speed input processor

compatible: "zmk,input-processor-pointer-speed"

include: ip_two_param.yaml

properties:
  track-remainders:
    type: boolean
  speed-multipliers:
    type: array
    default: [1, 1, 3]
  speed-divisors:
    type: array
    default: [2, 1, 2]
  initial-speed-index:
    type: int
    default: 1
  pointer-curve:
    type: string
    default: "linear"
    enum:
      - "linear"
      - "adaptive"
  pointer-curve-deadzone:
    type: int
    default: 2
  pointer-curve-accel-multiplier:
    type: int
    default: 1
  pointer-curve-accel-divisor:
    type: int
    default: 12
  pointer-curve-max-delta:
    type: int
    default: 120
