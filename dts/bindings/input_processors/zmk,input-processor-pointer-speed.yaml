description: Runtime pointer speed input processor

compatible: "zmk,input-processor-pointer-speed"

include: ip_two_param.yaml

properties:
  track-remainders:
    type: boolean
  one-x-multiplier:
    type: int
    default: 1
  one-x-divisor:
    type: int
    default: 1
  min-percent:
    type: int
    default: 10
  max-percent:
    type: int
    default: 400
  initial-speed-position:
    type: int
    default: 50
  pointer-curve:
    type: string
    default: "linear"
    enum:
      - "linear"
      - "adaptive"
  pointer-curve-deadzone:
    type: int
    default: 2
  pointer-curve-accel-multiplier:
    type: int
    default: 1
  pointer-curve-accel-divisor:
    type: int
    default: 12
  pointer-curve-max-delta:
    type: int
    default: 120
