description: Conditional drag-scroll input processor

compatible: "zmk,input-processor-drag-scroll"

include: ip_two_param.yaml

properties:
  track-remainders:
    type: boolean
  speed-multipliers:
    type: array
    default: [1, 1, 3]
  speed-divisors:
    type: array
    default: [2, 1, 2]
  initial-speed-index:
    type: int
    default: 1
  scroll-min-step:
    type: int
    default: 0
  scroll-max-delta:
    type: int
    default: 0
  scroll-curve-deadzone:
    type: int
    default: 2
  scroll-curve-accel-multiplier:
    type: int
    default: 1
  scroll-curve-accel-divisor:
    type: int
    default: 16
  scroll-inertia:
    type: boolean
  scroll-inertia-interval-ms:
    type: int
    default: 16
  scroll-inertia-decay-percent:
    type: int
    default: 70
  invert-scroll:
    type: boolean
    description: |
      Invert wheel and horizontal-wheel events handled by this processor.
  native-wheel-axis:
    type: string
    default: "vertical"
    enum:
      - "vertical"
      - "horizontal"
      - "horizontal-when-enabled"
