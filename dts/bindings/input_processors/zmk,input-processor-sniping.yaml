description: Conditional sniping input processor

compatible: "zmk,input-processor-sniping"

include: ip_two_param.yaml

properties:
  track-remainders:
    type: boolean
  speed-multipliers:
    type: array
    default: [1, 1, 3]
  speed-divisors:
    type: array
    default: [2, 1, 2]
  initial-speed-index:
    type: int
    default: 1
